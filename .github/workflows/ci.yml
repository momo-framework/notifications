name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: "PHP ${{ matrix.php }} — Tests & Coverage"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.5' ]

    steps:
      - name: "Checkout: notifications"
        uses: actions/checkout@v4
        with:
          path: notifications
          fetch-depth: 0

      - name: "Checkout: momo-framework/kernel"
        uses: actions/checkout@v4
        with:
          repository: momo-framework/kernel
          path: kernel
          token: ${{ secrets.GH_PAT }}

      - name: "Checkout: momo-framework/events"
        uses: actions/checkout@v4
        with:
          repository: momo-framework/events
          path: events
          token: ${{ secrets.GH_PAT }}

      - name: "Checkout: momo-framework/queue"
        uses: actions/checkout@v4
        with:
          repository: momo-framework/queue
          path: queue
          token: ${{ secrets.GH_PAT }}

      - name: "Checkout: momo-framework/console"
        uses: actions/checkout@v4
        with:
          repository: momo-framework/console
          path: console
          token: ${{ secrets.GH_PAT }}

      - name: "Setup PHP ${{ matrix.php }} with extensions"
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, pcov, sockets
          coverage: pcov
          ini-values: >-
            pcov.directory=src,
            opcache.enable_cli=1,
            opcache.jit=0

      - name: "Resolve Composer cache directory"
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: "Cache Composer dependencies"
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-php${{ matrix.php }}-${{ hashFiles('notifications/composer.lock') }}
          restore-keys: composer-php${{ matrix.php }}-

      - name: "Install dependencies"
        working-directory: notifications
        run: |
          composer config repositories.kernel path ../kernel
          composer config repositories.events path ../events
          composer config repositories.queue path ../queue
          composer config repositories.console path ../console
          composer install --prefer-dist --no-progress --no-interaction --ansi

      - name: "Run test suite"
        working-directory: notifications
        run: composer ci
